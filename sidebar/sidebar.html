<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <header id="topbar">
    <button id="spaceDot" title="Change space color"></button>
    <div id="spaceName" title="Click to rename">Personal</div>
    <button id="railBtn" class="icon-btn" title="Collapse to icon rail">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8.5 3.5 4 8l4.5 4.5M13 3.5 8.5 8l4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="addBtn" class="icon-btn" title="New folder">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M1.5 4.5A1.5 1.5 0 0 1 3 3h3l1.5 1.75H13A1.5 1.5 0 0 1 14.5 6.25V11.5A1.5 1.5 0 0 1 13 13H3a1.5 1.5 0 0 1-1.5-1.5v-7z" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8 7.2v3.2M6.4 8.8h3.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <main id="scroll">
    <div id="grid" class="grid"></div>
    <div id="list" class="list"></div>
    <div id="todayHead" class="section-head">
      <span class="section-label">Today</span>
      <button id="clearBtn" title="Close today's tabs">Clear</button>
    </div>
    <div id="today" class="list"></div>
  </main>

  <footer>
    <div id="newTab" class="row newtab" title="Open a new tab">
      <span class="plus">＋</span><span class="title">New Tab</span>
    </div>
  </footer>

  <script src="sidebar.js"></script>
</body>
</html>
