name = "nook-relay"
main = "worker.js"
compatibility_date = "2025-06-01"

# SQLite-backed Durable Objects are the class available on the Workers Free
# plan. The Room object doesn't actually use storage — it just needs the
# hibernation API — but must be declared as a sqlite class to run free.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
